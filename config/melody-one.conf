CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_DEVICE_NAME="Melody One"
CONFIG_BOARD_NICE_NANO=y
# Normal idle/low-power state must wait at least 10 minutes of no input.
CONFIG_ZMK_IDLE_TIMEOUT=600000
# Deep sleep disabled: this board/host pairing has repeatedly failed to
# reconnect after ZMK powers off from idle. Keep normal idle enabled above, but
# avoid the deep-sleep/poweroff path that forces BLE reconnect after long breaks.
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000  # only relevant when CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Remove BLE slave latency (default 30) so the keyboard listens on every
# connection interval. Eliminates the wake-up lag after short typing pauses
# at the cost of slightly higher battery drain. macOS may ignore this value.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
